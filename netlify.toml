[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# All NEXT_PUBLIC_* vars are intentionally embedded in the client bundle by
# Next.js — that's what the prefix means. Disable secrets scanning since
# Netlify incorrectly flags them as leaked secrets.
[build.environment]
  SECRETS_SCAN_ENABLED = "false"
